name: arrendaoco
description: "ArrendaOco - Plataforma de arrendamiento de inmuebles. Encuentra y publica propiedades en renta de manera fácil y segura."
publish_to: 'none'

version: 1.0.4+5

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2
  webview_flutter: ^4.10.0
  cupertino_icons: ^1.0.8
  path: ^1.9.0
  google_fonts: ^6.3.2
  geolocator: ^10.1.0 
  image_picker: ^1.0.7
  google_maps_flutter: ^2.7.0
  flutter_map: ^7.0.0
  # path_provider still needed for image picking/resizing occasionally
  path_provider: ^2.1.1
  latlong2: ^0.9.0
  flutter_local_notifications: ^19.5.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  easy_debounce: ^2.0.3
  firebase_core: ^3.12.0
  firebase_messaging: ^15.1.2
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.5.0
  flutter_animate: ^4.5.2
  vibration: ^3.1.4
  device_info_plus: 10.1.2  # Versión fija para evitar problemas de compilación con Kotlin
  crypto: ^3.0.3  # Encriptación de contraseñas
  dio: ^5.7.0
  shared_preferences: ^2.5.2
  supabase: ^2.6.0
  google_sign_in: ^6.2.2
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"

flutter:
  uses-material-design: true

  # Declarar los assets correctamente
  assets:
    - "assets/images/logo.png"
    - "assets/images/roco_ai.png"  # Ruta a tu imagen (ajústala si usas otra carpeta)
    - "assets/icon/logo.png"
    - "assets/animations/"  # Animaciones Lottie
