name: arrendaoco
description: "ArrendaOco - Plataforma de arrendamiento de inmuebles. Encuentra y publica propiedades en renta de manera fácil y segura."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.6.0
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8
  path: ^1.9.0
  google_fonts: ^6.3.2
  geolocator: ^10.1.0 
  image_picker: ^1.0.7
  google_maps_flutter: ^2.7.0
  flutter_map: ^7.0.0
  # path_provider still needed for image picking/resizing occasionally
  path_provider: ^2.1.1
  latlong2: ^0.9.0
  flutter_local_notifications: ^17.0.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.0
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png" # ruta a tu icono (ajústala si usas otra carpeta)

flutter:
  uses-material-design: true

  # Declarar los assets correctamente
  assets:
    - "assets/images/logo.png"  # Ruta a tu imagen (ajústala si usas otra carpeta)
    - "assets/animations/"  # Animaciones Lottie
